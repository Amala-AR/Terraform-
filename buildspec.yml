version: 0.2

# ── How this works ─────────────────────────────────────────
# CodeBuild project has ENVIRONMENT = dev | staging | prod
# Buildspec runs the SAME main.tf for all envs.
# The only thing that changes per env:
#   1. -var-file="envs/${ENVIRONMENT}.tfvars"
#   2. -backend-config key (state file path)
# ───────────────────────────────────────────────────────────

env:
  variables:
    TERRAFORM_VERSION: "1.7.5"
    # ENVIRONMENT is set per CodeBuild project — never hardcode here

  parameter-store:
    STATE_BUCKET:    "/myapp/shared/state_bucket"
    DYNAMO_TABLE:    "/myapp/shared/dynamo_table"
    AWS_DEFAULT_REGION: "/myapp/shared/aws_region"

phases:
  install:
    commands:
      - curl -fsSL https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip -o /tmp/tf.zip
      - unzip /tmp/tf.zip -d /usr/local/bin/
      - terraform version

  pre_build:
    commands:
      - echo "Environment = ${ENVIRONMENT}"

      # Each env gets its own state file — isolated, no cross-env risk
      - |
        terraform init \
          -backend-config="bucket=${STATE_BUCKET}" \
          -backend-config="key=myapp/${ENVIRONMENT}/terraform.tfstate" \
          -backend-config="region=${AWS_DEFAULT_REGION}" \
          -backend-config="dynamodb_table=${DYNAMO_TABLE}" \
          -input=false

  build:
    commands:
      # SAME main.tf, different var-file — this is the whole point
      - |
        terraform plan \
          -var-file="envs/${ENVIRONMENT}.tfvars" \
          -input=false \
          -out=tfplan

      - terraform show -no-color tfplan > tfplan_${ENVIRONMENT}.txt
      - cat tfplan_${ENVIRONMENT}.txt

      - |
        terraform apply \
          -input=false \
          -auto-approve \
          tfplan

  post_build:
    commands:
      - terraform output -json > tf_outputs_${ENVIRONMENT}.json
      - terraform output -raw instance_id > instance_id_${ENVIRONMENT}.txt
      - echo "Done. Instance = $(cat instance_id_${ENVIRONMENT}.txt)"

artifacts:
  files:
    - tf_outputs_*.json
    - instance_id_*.txt
    - tfplan_*.txt
